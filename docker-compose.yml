services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_card_collection
      POSTGRES_USER: ai_card_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_card_user -d ai_card_collection"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://ai_card_user:${DB_PASSWORD}@db:5432/ai_card_collection
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BATTLE_REWARD_WIN_BASE: ${BATTLE_REWARD_WIN_BASE:-200}
      BATTLE_REWARD_WIN_PER_TURN: ${BATTLE_REWARD_WIN_PER_TURN:-50}
      BATTLE_REWARD_DRAW: ${BATTLE_REWARD_DRAW:-100}
      BATTLE_REWARD_LOSS: ${BATTLE_REWARD_LOSS:-50}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: /api
        VITE_BASE_URL: /
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
